name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Test
        run: python3 test_server.py stdio --binary ./target/release/mcp-wsl

  build:
    name: Build ${{ matrix.artifact }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: mcp-wsl-linux-amd64
          - target: i686-unknown-linux-gnu
            artifact: mcp-wsl-linux-i386
          - target: aarch64-unknown-linux-gnu
            artifact: mcp-wsl-linux-arm64
          - target: armv7-unknown-linux-gnueabihf
            artifact: mcp-wsl-linux-arm32

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        run: cross build --release --target ${{ matrix.target }}
      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/mcp-wsl ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  aur:
    name: Update AUR packages
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Strip v prefix from tag
        id: ver
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update mcp-wsl (source build)
        uses: heyhusen/archlinux-package-action@v3.0.0
        with:
          path: packaging/aur/mcp-wsl
          pkgver: ${{ steps.ver.outputs.pkgver }}
          updpkgsums: true
          srcinfo: true
          namcap: false

      - name: Update mcp-wsl-bin (pre-built binary)
        uses: heyhusen/archlinux-package-action@v3.0.0
        with:
          path: packaging/aur/mcp-wsl-bin
          pkgver: ${{ steps.ver.outputs.pkgver }}
          updpkgsums: true
          srcinfo: true
          namcap: false

      - name: Commit updated AUR files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/
          git diff --cached --quiet || git commit -m "chore: update AUR packages to ${{ github.ref_name }}"
          git push origin HEAD:master
